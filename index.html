<style>
/* 销售五区 dashboard — base styles */
:root {
  --bg: #f7f8fa;
  --surface: #ffffff;
  --ink: #0f1c2e;
  --ink-2: #2c3a4d;
  --muted: #5b6776;
  --line: #e6e9ee;
  --line-strong: #d3d8e0;

  --primary: #1a4a8a;
  --primary-2: #143a6d;
  --primary-tint: #eaf0f9;

  --green: #1f8a4c;
  --green-tint: #e7f5ed;
  --red: #c0392b;
  --red-tint: #fbeae7;
  --amber: #c2710c;
  --amber-tint: #fcf1de;
  --slate: #6b7888;
  --slate-tint: #eef1f4;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
  font-size: 14px;
  color: var(--ink);
  background: var(--bg);
  font-feature-settings: "tnum" 1, "ss01" 1;
  -webkit-font-smoothing: antialiased;
}

button { font-family: inherit; }

/* Top app bar */
.appbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--primary);
  color: #fff;
  border-bottom: 1px solid var(--primary-2);
}
.appbar-inner {
  max-width: 1320px; margin: 0 auto;
  padding: 14px 28px; display: flex; align-items: center; gap: 24px;
}
.appbar h1 {
  font-size: 16px; font-weight: 600; margin: 0; letter-spacing: 0.2px;
}
.appbar .meta {
  font-size: 12px; opacity: 0.78; margin-left: auto; font-variant-numeric: tabular-nums;
}
.appbar nav {
  display: flex; gap: 4px; flex: 1; overflow-x: auto;
}
.appbar nav a {
  color: rgba(255,255,255,0.78); text-decoration: none;
  font-size: 12.5px; padding: 6px 10px; border-radius: 6px;
  white-space: nowrap;
}
.appbar nav a:hover { color: #fff; background: rgba(255,255,255,0.08); }
.appbar nav a.active { color: #fff; background: rgba(255,255,255,0.14); }

/* Layout */
.page { max-width: 1320px; margin: 0 auto; padding: 32px 28px 80px; }
.page > * + * { margin-top: 36px; }

/* Section */
section.block {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 24px 26px;
}
section.block.flush { padding: 0; overflow: hidden; }

.sect-head {
  display: flex; align-items: flex-start; gap: 16px; margin-bottom: 18px;
}
.sect-head h2 {
  font-size: 17px; font-weight: 600; margin: 0; color: var(--ink);
  letter-spacing: 0.1px;
}
.sect-head .num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--primary-tint); color: var(--primary);
  font-size: 12px; font-weight: 600; flex-shrink: 0; margin-top: 1px;
}
.sect-head .scope {
  margin-left: auto; padding: 4px 10px; border-radius: 999px;
  background: var(--slate-tint); color: var(--slate); font-size: 11.5px; font-weight: 500;
  flex-shrink: 0;
}

.takeaway {
  border-left: 3px solid var(--primary);
  padding: 10px 14px;
  background: var(--primary-tint);
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  color: var(--ink-2);
  margin-bottom: 18px;
  line-height: 1.55;
}
.takeaway b { color: var(--primary-2); }

.action {
  margin-top: 18px;
  border: 1px dashed var(--line-strong);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--ink-2);
  background: #fafbfc;
  line-height: 1.55;
  display: flex; gap: 10px; align-items: flex-start;
}
.action .lbl {
  font-size: 11px; font-weight: 600; color: var(--amber);
  letter-spacing: 0.5px; padding: 2px 8px; background: var(--amber-tint);
  border-radius: 4px; flex-shrink: 0; margin-top: 1px;
}

/* Numbers */
.num-big { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--ink); }
.delta { display: inline-flex; align-items: baseline; gap: 3px; font-size: 12px; font-weight: 500; font-variant-numeric: tabular-nums; }
.delta.up { color: var(--green); }
.delta.down { color: var(--red); }
.delta.flat { color: var(--slate); }

/* KPI cards */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 14px;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px 18px;
  display: flex; flex-direction: column; gap: 8px;
  min-height: 118px;
}
.kpi .kpi-label { font-size: 12px; color: var(--muted); font-weight: 500; }
.kpi .kpi-val { font-size: 24px; font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; line-height: 1.1; }
.kpi .kpi-val small { font-size: 13px; color: var(--muted); font-weight: 500; margin-left: 4px; }
.kpi .kpi-foot { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: auto; }
.kpi .kpi-foot .lbl { font-size: 11px; color: var(--muted); }

/* Alert bar */
.alerts {
  background: linear-gradient(to right, #fff5f3, #fffaf3);
  border: 1px solid #f5cfc7;
  border-left: 4px solid var(--red);
  border-radius: 8px;
  padding: 14px 18px;
}
.alerts h3 {
  font-size: 12px; font-weight: 700; color: var(--red); margin: 0 0 10px;
  letter-spacing: 0.6px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.alerts h3::before {
  content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--red);
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(192,57,43,0.4); }
  50% { opacity: 0.85; box-shadow: 0 0 0 6px rgba(192,57,43,0); }
}
.alert-list { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px 20px; }
.alert-item {
  display: flex; gap: 10px; align-items: flex-start; font-size: 13px; line-height: 1.5;
}
.alert-item .tag {
  font-size: 10px; font-weight: 700; color: #fff; background: var(--red);
  padding: 2px 6px; border-radius: 3px; letter-spacing: 0.4px; flex-shrink: 0; margin-top: 2px;
}
.alert-item .tag.p1 { background: var(--amber); }
.alert-item .body { color: var(--ink-2); }
.alert-item .body b { color: var(--ink); }

/* Tables */
table.dt {
  width: 100%; border-collapse: collapse; font-size: 13px; font-variant-numeric: tabular-nums;
}
table.dt th, table.dt td {
  padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
table.dt th {
  font-weight: 600; color: var(--muted); font-size: 12px;
  background: #fafbfc; position: sticky; top: 0;
  border-bottom: 1px solid var(--line-strong);
  user-select: none; white-space: nowrap;
}
table.dt th.sortable { cursor: pointer; }
table.dt th.sortable:hover { color: var(--primary); }
table.dt th .sort-ind { margin-left: 4px; opacity: 0.4; font-size: 10px; }
table.dt th.sorted .sort-ind { opacity: 1; color: var(--primary); }
table.dt td.num, table.dt th.num { text-align: right; }
table.dt tr:last-child td { border-bottom: none; }
table.dt tbody tr:hover { background: #fafbfc; }
table.dt tbody tr.expandable { cursor: pointer; }
table.dt tbody tr.row-open { background: var(--primary-tint) !important; }

/* Pills / badges */
.pill {
  display: inline-block;
  padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
  background: var(--slate-tint); color: var(--slate);
}
.pill.cat-纯碱 { background: #e8f0fa; color: #1a4a8a; }
.pill.cat-尿素 { background: #fcf1de; color: #8a5210; }
.pill.cat-小苏打 { background: #ece9f7; color: #4d3d8a; }
.pill.risk-高 { background: var(--red-tint); color: var(--red); }
.pill.risk-中 { background: var(--amber-tint); color: var(--amber); }
.pill.risk-低 { background: var(--green-tint); color: var(--green); }

/* Bars in table */
.bar-cell { display: flex; align-items: center; gap: 8px; }
.bar-track { width: 70px; height: 6px; background: var(--slate-tint); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--primary); border-radius: 3px; }
.bar-fill.green { background: var(--green); }
.bar-fill.red { background: var(--red); }

/* Mix segmented bar */
.mix-bar {
  display: flex; height: 6px; width: 110px; border-radius: 3px; overflow: hidden;
  background: var(--slate-tint);
}
.mix-bar > span { display: block; height: 100%; }
.mix-bar .s-纯碱 { background: #1a4a8a; }
.mix-bar .s-尿素 { background: #c98a2a; }
.mix-bar .s-小苏打 { background: #6b5cb8; }

/* Drill-down child rows */
tr.drill td {
  background: #fafbfc !important; padding: 0; border-bottom: 1px solid var(--line);
}
.drill-inner { padding: 14px 18px 18px 56px; }
.drill-inner h4 {
  margin: 0 0 8px; font-size: 12px; font-weight: 600; color: var(--muted);
  letter-spacing: 0.4px; text-transform: uppercase;
}
.drill-cust-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px 24px;
  font-size: 12.5px;
}
.drill-cust {
  display: grid; grid-template-columns: 24px 1fr 70px 90px;
  align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px dashed var(--line);
}
.drill-cust .ix { color: var(--muted); font-size: 11px; }
.drill-cust .nm { color: var(--ink-2); }
.drill-cust .tn { text-align: right; font-variant-numeric: tabular-nums; color: var(--ink); }

/* Section 1 — category overview */
.cat-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
}
.cat-card {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 18px 20px;
}
.cat-card h3 {
  margin: 0 0 6px; font-size: 13px; color: var(--muted); font-weight: 600;
  display: flex; align-items: center; justify-content: space-between;
}
.cat-card h3 .month { font-size: 11px; padding: 2px 8px; background: var(--slate-tint); border-radius: 999px; color: var(--slate); }
.cat-card .totals {
  display: flex; gap: 24px; margin-bottom: 14px; align-items: baseline;
}
.cat-card .totals .v { font-size: 22px; font-weight: 600; }
.cat-card .totals .l { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
.cat-card .totals > div { display: flex; flex-direction: column; }

.cat-rows { display: flex; flex-direction: column; gap: 10px; }
.cat-row { display: grid; grid-template-columns: 60px 1fr 80px 90px; gap: 12px; align-items: center; font-size: 13px; }
.cat-row .nm { font-weight: 500; }
.cat-row .stack { display: flex; flex-direction: column; gap: 4px; }
.cat-row .lbl { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }
.cat-row .trk { height: 6px; background: var(--slate-tint); border-radius: 3px; overflow: hidden; }
.cat-row .trk > span { display: block; height: 100%; }
.cat-row .nums { text-align: right; font-variant-numeric: tabular-nums; }
.cat-row .nums small { color: var(--muted); font-size: 11px; }

/* Two-up layout */
.two-up { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; align-items: stretch; }

/* Right rail summary box */
.summary-box {
  background: #fafbfc; border: 1px solid var(--line); border-radius: 8px;
  padding: 16px 18px; font-size: 12.5px; line-height: 1.6;
}
.summary-box h4 { margin: 0 0 10px; font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }
.summary-box dl { margin: 0; display: grid; grid-template-columns: 1fr auto; row-gap: 8px; column-gap: 16px; }
.summary-box dt { color: var(--muted); }
.summary-box dd { margin: 0; color: var(--ink); font-weight: 500; font-variant-numeric: tabular-nums; }

/* Toolbar above table */
.tbl-toolbar {
  display: flex; align-items: center; gap: 12px; padding: 12px 18px;
  border-bottom: 1px solid var(--line); background: #fafbfc;
}
.tbl-toolbar .label { font-size: 12px; color: var(--muted); }
.tbl-toolbar input[type=search],
.tbl-toolbar select {
  font: inherit; font-size: 12.5px; padding: 6px 10px;
  border: 1px solid var(--line-strong); border-radius: 6px; background: #fff;
  color: var(--ink);
}
.tbl-toolbar input[type=search] { width: 200px; }
.tbl-toolbar input[type=search]:focus,
.tbl-toolbar select:focus { outline: 2px solid var(--primary); outline-offset: -1px; border-color: var(--primary); }
.tbl-toolbar .spacer { flex: 1; }
.tbl-toolbar button {
  font-size: 12px; padding: 6px 12px; border-radius: 6px;
  border: 1px solid var(--line-strong); background: #fff; cursor: pointer; color: var(--ink-2);
}
.tbl-toolbar button:hover { border-color: var(--primary); color: var(--primary); }

/* Footnote */
.foot-note { font-size: 11.5px; color: var(--muted); margin-top: 12px; line-height: 1.5; }

/* Small utility */
.dim { color: var(--muted); }
.mono { font-variant-numeric: tabular-nums; }
.divider { height: 1px; background: var(--line); margin: 14px 0; }

</style>
</head>

<script type="text/babel" data-presets="react" data-filename="helpers.jsx">
// shared helpers + small components
const { useState, useMemo, useEffect, useRef } = React;

const fmtTons = (v) => v == null ? '—' : Math.round(v).toLocaleString('en-US');
const fmtTonsK = (v) => v == null ? '—' : (v >= 10000 ? (v/10000).toFixed(2)+'万' : Math.round(v).toLocaleString('en-US'));
const fmtAmt = (v) => v == null ? '—' : (v/10000).toFixed(0); // 万元
const fmtAmtY = (v) => v == null ? '—' : (v/100000000).toFixed(2); // 亿元
const fmtPct = (v) => v == null ? '—' : (v*100).toFixed(1) + '%';
const fmtPctNum = (v) => v == null ? '—' : v.toFixed(1) + '%';

// Δ arrow component
function Delta({ value, suffix='%', invert=false, neutralThreshold=0 }) {
  if (value == null || isNaN(value)) return <span className="delta flat">—</span>;
  const v = Number(value);
  const dir = Math.abs(v) <= neutralThreshold ? 'flat' : (v > 0 ? 'up' : 'down');
  const cls = invert ? (dir==='up' ? 'down' : dir==='down' ? 'up' : 'flat') : dir;
  const arrow = dir==='up' ? '▲' : dir==='down' ? '▼' : '–';
  return <span className={"delta "+cls}>{arrow} {Math.abs(v).toFixed(1)}{suffix}</span>;
}

function Pill({ kind, value, children }) {
  return <span className={"pill "+(kind ? kind+'-'+(value||'') : '')}>{children || value}</span>;
}

function CatPill({ cat }) {
  if (!cat) return null;
  return <span className={"pill cat-"+cat}>{cat}</span>;
}

function Bar({ value, max, color='primary' }) {
  const pct = max > 0 ? Math.min(100, (value/max)*100) : 0;
  return (
    <div className="bar-track">
      <div className={"bar-fill "+color} style={{width: pct+'%'}}></div>
    </div>
  );
}

// Sortable table header
function ThSort({ k, label, num=false, sortKey, sortDir, onSort, title }) {
  const sorted = sortKey === k;
  return (
    <th className={(num?'num ':'')+'sortable'+(sorted?' sorted':'')} onClick={()=>onSort(k)} title={title}>
      {label}<span className="sort-ind">{sorted ? (sortDir==='asc'?'▲':'▼') : '⇅'}</span>
    </th>
  );
}

// Mix bar (3 segments)
function MixBar({ p1, p2, p3 }) {
  return (
    <div className="mix-bar" title={`纯碱 ${p1.toFixed(0)}% / 尿素 ${p2.toFixed(0)}% / 小苏打 ${p3.toFixed(0)}%`}>
      <span className="s-纯碱" style={{width: p1+'%'}}></span>
      <span className="s-尿素" style={{width: p2+'%'}}></span>
      <span className="s-小苏打" style={{width: p3+'%'}}></span>
    </div>
  );
}

// CSV export
function downloadCSV(rows, filename) {
  const csv = rows.map(r => r.map(c => {
    const s = c == null ? '' : String(c);
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

Object.assign(window, { fmtTons, fmtTonsK, fmtAmt, fmtAmtY, fmtPct, fmtPctNum, Delta, Pill, CatPill, Bar, ThSort, MixBar, downloadCSV });

</script>
<script type="text/babel" data-presets="react" data-filename="exec_summary.jsx">
// Executive summary: KPIs only (alerts removed by user request)
function ExecSummary() {
  const D = window.DASH_DATA;
  const mar = D.mar.total, apr = D.apr.total;

  const apr14Total = D.salespeople.reduce((s,x)=>s+(x.apr14||0),0);
  const mar14Total = D.salespeople.reduce((s,x)=>s+(x.mar14||0),0);
  const totalMoM_14 = mar14Total > 0 ? (apr14Total - mar14Total)/mar14Total*100 : 0;

  const trend = D.trend;
  const m2 = trend.find(x=>x.month==='26年2月'); const m3 = trend.find(x=>x.month==='26年3月');
  const mar3v2_tons = ((m3.纯碱+m3.尿素+m3.小苏打) - (m2.纯碱+m2.尿素+m2.小苏打)) / (m2.纯碱+m2.尿素+m2.小苏打) * 100;

  const newCount = D.newCust.length;
  const lostCount = D.lostCust.length;
  const lostTons = D.lostCust.reduce((s,x)=>s+(x.tons||0),0);
  const newTons = D.newCust.reduce((s,x)=>s+(x.tons||0),0);
  const teamTotal = D.salespeople.reduce((s,x)=>s+(x.total||0),0);
  const top10Tons = D.salespeople.slice().sort((a,b)=>(b.total||0)-(a.total||0)).slice(0,10).reduce((s,x)=>s+(x.total||0),0);
  const top10Pct = (top10Tons/teamTotal*100);

  const kpis = [
    { label:'3月发货总量', val:(mar.tons/10000).toFixed(2), unit:'万吨',
      sub:[{lbl:'环比2月', node:<Delta value={mar3v2_tons} />},
           {lbl:'合作单位', node:<span className="dim">{mar.customers}家</span>}] },
    { label:'3月出库金额', val:(mar.amount/100000000).toFixed(2), unit:'亿元',
      sub:[{lbl:'加权均价', node:<span className="mono">¥{Math.round(mar.avgPrice)}/吨</span>}] },
    { label:'4月前14天', val:(apr14Total/10000).toFixed(2), unit:'万吨',
      sub:[{lbl:'同口径(vs 3月前14)', node:<Delta value={totalMoM_14} />}] },
    { label:'团队规模', val:D.salespeople.length, unit:'人',
      sub:[{lbl:'TOP10 占比', node:<span className="mono">{top10Pct.toFixed(1)}%</span>}] },
    { label:'3月新客户', val:newCount, unit:'家',
      sub:[{lbl:'新增量', node:<span className="mono" style={{color:'var(--green)'}}>+{Math.round(newTons).toLocaleString()}吨</span>}] },
    { label:'3月流失客户', val:lostCount, unit:'家',
      sub:[{lbl:'流失量', node:<span className="mono" style={{color:'var(--red)'}}>-{Math.round(lostTons).toLocaleString()}吨</span>}] },
  ];

  return (
    <section className="block" style={{padding:'24px 26px 22px'}}>
      <div style={{display:'flex', alignItems:'baseline', gap:14, marginBottom:16}}>
        <h2 style={{fontSize:18, fontWeight:600, margin:0}}>执行摘要</h2>
        <span className="dim" style={{fontSize:12.5}}>3-4月 销售五区 · 共7,213笔订单 · 344家客户 · 31位业务员</span>
        <span className="scope" style={{marginLeft:'auto'}}>v6 · 截至 2026-04-15</span>
      </div>
      <div className="kpi-grid">
        {kpis.map((k,i)=>(
          <div className="kpi" key={i}>
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-val">{k.val}<small>{k.unit}</small></div>
            <div className="kpi-foot">
              {k.sub.map((s,j)=>(
                <div key={j} style={{display:'flex', flexDirection:'column', gap:2}}>
                  <span className="lbl">{s.lbl}</span>
                  <span style={{fontSize:12.5}}>{s.node}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}
window.ExecSummary = ExecSummary;

</script>

<script type="text/babel" data-presets="react" data-filename="section_salesperson.jsx">
// Section 7 — Merged salesperson grand table with sort + drilldown
function SalespersonGrandTable() {
  const D = window.DASH_DATA;
  const [sortKey, setSortKey] = useState('total');
  const [sortDir, setSortDir] = useState('desc');
  const [expanded, setExpanded] = useState(null);
  const [riskFilter, setRiskFilter] = useState('all');
  const [search, setSearch] = useState('');

  const onSort = (k) => {
    if (sortKey === k) setSortDir(d => d==='asc'?'desc':'asc');
    else { setSortKey(k); setSortDir('desc'); }
  };

  // Build rows from salespeople array
  const rows = useMemo(() => {
    let r = D.salespeople.map(s => ({
      ...s,
      total: s.total || 0,
      apr14: s.apr14 || 0,
      mar14: s.mar14 || 0,
      pctNum: parseFloat((s.pct||'0').replace(/[^0-9.\-]/g,'')) * (String(s.pct).startsWith('-')?-1:1),
      orders: s.orders || 0,
      avgOrderTons: s.avgOrderTons || 0,
      avgCustTons: s.avgCustTons || 0,
      avgCustAmt: s.avgCustAmt || 0,
      top1Pct: s.top1Pct || 0,
      catCount: s.catCount || 0,
      custCount: s.custCount || 0,
    }));
    if (riskFilter !== 'all') r = r.filter(x => x.riskLevel === riskFilter);
    if (search.trim()) r = r.filter(x => x.name.includes(search.trim()) || (x.top1Name||'').includes(search.trim()));
    r.sort((a,b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (av == null && bv == null) return 0;
      if (av == null) return 1; if (bv == null) return -1;
      if (typeof av === 'number') return sortDir==='asc' ? av-bv : bv-av;
      return sortDir==='asc' ? String(av).localeCompare(bv) : String(bv).localeCompare(av);
    });
    return r;
  }, [sortKey, sortDir, riskFilter, search]);

  const teamTotal = D.salespeople.reduce((s,x)=>s+(x.total||0),0);
  const maxTotal = Math.max(...D.salespeople.map(x=>x.total||0));

  // Customer drill: lookup by salesperson name from full list
  const customersBy = useMemo(() => {
    const m = {};
    for (const c of D.fullCust) {
      if (!m[c.salesperson]) m[c.salesperson] = [];
      m[c.salesperson].push(c);
    }
    return m;
  }, []);

  const handleExport = () => {
    const header = ['业务员','3-4月吨数','占团队%','订单数','客户数','纯碱%','尿素%','小苏打%','3月前14','4月前14','环比%','均单吨数','客均吨数','客均金额(万)','TOP1客户','TOP1占比','风险'];
    const data = rows.map(r => [
      r.name, r.total, ((r.total/teamTotal)*100).toFixed(1),
      r.orders, r.custCount, r.pct纯碱, r.pct尿素, r.pct小苏打,
      r.mar14, r.apr14, r.pct, r.avgOrderTons, r.avgCustTons, r.avgCustAmt,
      r.top1Name, r.top1Pct, r.riskLevel
    ]);
    downloadCSV([header, ...data], '业务员综合明细_3-4月.csv');
  };

  return (
    <section className="block flush" id="sec-sales">
      <div style={{padding:'24px 26px 0'}}>
        <div className="sect-head">
          <span className="num">7</span>
          <h2>业务员综合大表（贡献 / 品类结构 / 同口径环比 / 效率 / 风险）</h2>
          <span className="scope">3-4月合计 · 环比为前14天同口径</span>
        </div>
        <div className="takeaway">
          <b>结论：</b> 团队 31人，TOP3（刘总 / 杭盖 / 毛文虎）合计 <b>{Math.round((D.salespeople[0].total+D.salespeople[1].total+D.salespeople[2].total)/teamTotal*100)}%</b> 销量；4月前14天同口径，<b>11人增长 / 18人下滑</b>，杭盖、徐义文、靳回归 三条线下滑显著。<b>11位</b>业务员处于高集中度风险，TOP1客户占比≥50%，需推动客户结构多元化。
        </div>
      </div>

      <div className="tbl-toolbar">
        <span className="label">筛选</span>
        <input type="search" placeholder="搜业务员或TOP1客户" value={search} onChange={e=>setSearch(e.target.value)} />
        <select value={riskFilter} onChange={e=>setRiskFilter(e.target.value)}>
          <option value="all">全部风险等级</option>
          <option value="高">高（TOP1&gt;50%）</option>
          <option value="中">中</option>
          <option value="低">低</option>
        </select>
        <span className="label" style={{marginLeft:8}}>
          显示 <b style={{color:'var(--ink)'}}>{rows.length}</b> / {D.salespeople.length} 人 ·
          合计 <b style={{color:'var(--ink)'}}>{(rows.reduce((s,x)=>s+x.total,0)/10000).toFixed(2)}万吨</b>
        </span>
        <span className="spacer"></span>
        <span className="label dim">点击业务员行展开客户清单</span>
        <button onClick={handleExport}>导出 CSV</button>
      </div>

      <div style={{maxHeight: 720, overflow:'auto'}}>
        <table className="dt">
          <thead>
            <tr>
              <th style={{width:32}}></th>
              <ThSort k="name" label="业务员" sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <ThSort k="total" label="3-4月吨数" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <th className="num">占团队%</th>
              <th>品类结构</th>
              <ThSort k="catCount" label="品类数" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <ThSort k="custCount" label="客户数" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <ThSort k="orders" label="订单数" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <ThSort k="avgOrderTons" label="均单(吨)" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} title="订单均吨数" />
              <ThSort k="avgCustTons" label="客均(吨)" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} title="客均吨数" />
              <ThSort k="apr14" label="4月前14" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <ThSort k="pctNum" label="同口径环比" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} title="vs 3月前14天" />
              <th>TOP1客户</th>
              <ThSort k="top1Pct" label="TOP1%" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <th>风险</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r,i) => {
              const isOpen = expanded === r.name;
              const teamPct = (r.total/teamTotal*100);
              return (
                <React.Fragment key={r.name}>
                  <tr className={"expandable"+(isOpen?' row-open':'')} onClick={()=>setExpanded(isOpen?null:r.name)}>
                    <td style={{textAlign:'center', color:'var(--muted)', fontSize:11}}>
                      {isOpen ? '▾' : '▸'}
                    </td>
                    <td style={{fontWeight:600}}>
                      {r.name}
                      {i < 3 && <span style={{marginLeft:6, fontSize:10, padding:'1px 5px', background:'var(--primary-tint)', color:'var(--primary)', borderRadius:3, verticalAlign:'1px'}}>TOP{i+1}</span>}
                    </td>
                    <td className="num">
                      <div className="bar-cell" style={{justifyContent:'flex-end'}}>
                        <span className="num-big">{Math.round(r.total).toLocaleString()}</span>
                        <Bar value={r.total} max={maxTotal} />
                      </div>
                    </td>
                    <td className="num mono">{teamPct.toFixed(1)}%</td>
                    <td><MixBar p1={r.pct纯碱||0} p2={r.pct尿素||0} p3={r.pct小苏打||0} /></td>
                    <td className="num">{r.catCount || '—'}</td>
                    <td className="num">{r.custCount || '—'}</td>
                    <td className="num dim">{r.orders ? r.orders.toLocaleString() : '—'}</td>
                    <td className="num">{r.avgOrderTons ? r.avgOrderTons.toFixed(0) : '—'}</td>
                    <td className="num">{r.avgCustTons ? Math.round(r.avgCustTons).toLocaleString() : '—'}</td>
                    <td className="num mono">{r.apr14 ? Math.round(r.apr14).toLocaleString() : '—'}</td>
                    <td className="num">
                      {r.pct ? <Delta value={r.pctNum} suffix="%" /> : <span className="dim">—</span>}
                    </td>
                    <td style={{maxWidth:180, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontSize:12}} title={r.top1Name}>
                      {r.top1Name || '—'}
                    </td>
                    <td className="num mono" style={{color: r.top1Pct >= 70 ? 'var(--red)' : r.top1Pct >= 50 ? 'var(--amber)' : 'inherit'}}>
                      {r.top1Pct ? r.top1Pct.toFixed(1)+'%' : '—'}
                    </td>
                    <td>{r.riskLevel ? <Pill kind="risk" value={r.riskLevel} /> : <span className="dim">—</span>}</td>
                  </tr>
                  {isOpen && (
                    <tr className="drill">
                      <td colSpan={15}>
                        <DrillCustomers customers={customersBy[r.name] || []} salesperson={r} />
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>

      <div style={{padding:'14px 26px 22px'}}>
        <div className="action">
          <span className="lbl">本周做什么</span>
          <span>① 与 <b>杭盖、徐义文、靳回归</b>三人单独 1:1，复盘 4月前14天下滑根因（杭盖中农天津 41.9% 单客户依赖最严重）；② 高风险11人本周内提交 <b>客户多元化方案</b>（吕小平/李旭/高连柱 单客户≥87%，必须开 2 个新客户）；③ 表彰增长 TOP3：丁帅雄(+157%)、吕小平(+90%)、陈宇轩(+89%)。</span>
        </div>
      </div>
    </section>
  );
}

function DrillCustomers({ customers, salesperson }) {
  const [view, setView] = useState('all'); // all | top | concern
  const sorted = [...customers].sort((a,b) => (b.tons||0) - (a.tons||0));
  const top = sorted.slice(0, 10);
  const list = view === 'top' ? top : sorted;

  if (!customers.length) {
    return (
      <div className="drill-inner">
        <div style={{color:'var(--muted)', fontSize:12.5}}>暂无关联客户数据</div>
      </div>
    );
  }

  const totalT = sorted.reduce((s,c)=>s+(c.tons||0),0);

  return (
    <div className="drill-inner">
      <div style={{display:'flex', alignItems:'center', gap:14, marginBottom:10}}>
        <h4 style={{margin:0}}>{salesperson.name} · 客户清单（{sorted.length}家 · {Math.round(totalT).toLocaleString()}吨）</h4>
        <div style={{display:'flex', gap:4, marginLeft:'auto'}}>
          {[['all','全部'],['top','TOP10']].map(([k,l]) => (
            <button key={k} onClick={()=>setView(k)} style={{
              fontSize:11, padding:'3px 9px', borderRadius:4,
              border:'1px solid '+(view===k?'var(--primary)':'var(--line-strong)'),
              background: view===k ? 'var(--primary-tint)' : '#fff',
              color: view===k ? 'var(--primary)' : 'var(--ink-2)', cursor:'pointer'
            }}>{l}</button>
          ))}
        </div>
        <div style={{fontSize:11.5, color:'var(--muted)'}}>
          TOP1占比 <b style={{color: salesperson.top1Pct>=70?'var(--red)':salesperson.top1Pct>=50?'var(--amber)':'var(--ink)'}}>{(salesperson.top1Pct||0).toFixed(1)}%</b> · TOP3 {(salesperson.top3Pct||0).toFixed(1)}%
        </div>
      </div>
      <div className="drill-cust-grid">
        {list.map((c,i) => {
          const pct = totalT>0 ? c.tons/totalT*100 : 0;
          return (
            <div className="drill-cust" key={i}>
              <span className="ix">{i+1}</span>
              <span className="nm" title={c.name}>
                {c.name.length > 22 ? c.name.slice(0,22)+'…' : c.name}
                <CatPill cat={c.cat} />
              </span>
              <span className="tn">{Math.round(c.tons||0).toLocaleString()}<small style={{color:'var(--muted)'}}> 吨</small></span>
              <span className="tn">
                <span style={{display:'inline-block', width:50, height:4, background:'var(--slate-tint)', borderRadius:2, verticalAlign:'middle', marginRight:6}}>
                  <span style={{display:'block', height:'100%', width:Math.min(100,pct)+'%', background:'var(--primary)', borderRadius:2}}></span>
                </span>
                {pct.toFixed(1)}%
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

window.SalespersonGrandTable = SalespersonGrandTable;

</script>
<script type="text/babel" data-presets="react" data-filename="sections_extra.jsx">

// ====================================================================
// Section 2 — 6个月销量趋势
// ====================================================================
function Section2Trend() {
  const D = window.DASH_DATA;
  const trend = D.trend;
  const monthsTons = trend.map(t => (t.纯碱||0)+(t.尿素||0)+(t.小苏打||0));
  const maxM = Math.max(...monthsTons);

  const m4 = trend.find(x=>x.month==='26年4月');
  const m3 = trend.find(x=>x.month==='26年3月');
  const m4tot = m4 ? (m4.纯碱+m4.尿素+m4.小苏打) : 0;
  const m3tot = m3 ? (m3.纯碱+m3.尿素+m3.小苏打) : 0;

  return (
    <section className="block" id="sec-trend">
      <div className="sect-head">
        <span className="num">2</span>
        <h2>6个月销量趋势</h2>
        <span className="scope">25年11月 ~ 26年4月15日</span>
      </div>
      <div className="takeaway">
        <b>结论：</b> 3月达半年峰值 <b>{(m3tot/10000).toFixed(2)}万吨</b>（纯碱主推），4月前半月节奏放缓 <b>{(m4tot/10000).toFixed(2)}万吨</b>（半月数据 ×2 估算约 {(m4tot*2/10000).toFixed(2)}万吨，仍低于3月）。小苏打 12月-2月持续高位后回落，需关注饲料客户季节性。
      </div>

      <div style={{padding:'14px 18px', border:'1px solid var(--line)', borderRadius:8}}>
        <div style={{display:'grid', gridTemplateColumns:'repeat(6, 1fr)', gap:18, alignItems:'end', height:260}}>
          {trend.map((t,i)=>{
            const tot = (t.纯碱||0)+(t.尿素||0)+(t.小苏打||0);
            const h = tot/maxM*100;
            const isHalf = !!t.note;
            return (
              <div key={i} style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end', height:'100%'}}>
                <div style={{fontSize:13, fontWeight:600, color:'var(--ink-2)', marginBottom:6}}>
                  {(tot/10000).toFixed(2)}<span style={{opacity:0.6, fontSize:11, marginLeft:1}}>万</span>
                </div>
                <div style={{width:'78%', height:h+'%', display:'flex', flexDirection:'column', borderRadius:'4px 4px 0 0', overflow:'hidden', minHeight:8, opacity: isHalf ? 0.55 : 1}}>
                  <div style={{flex: t.纯碱||0, background:'#1a4a8a'}}></div>
                  <div style={{flex: t.尿素||0, background:'#c98a2a'}}></div>
                  <div style={{flex: t.小苏打||0, background:'#6b5cb8'}}></div>
                </div>
                <div style={{fontSize:13, color:'var(--ink-2)', marginTop:10, fontWeight: i===4?700:500}}>
                  {t.month.replace('25年','').replace('26年','')}
                </div>
                {isHalf && <div style={{fontSize:10.5, color:'var(--amber)', marginTop:2}}>半月</div>}
              </div>
            );
          })}
        </div>
        <div style={{display:'flex', gap:18, marginTop:16, fontSize:12, color:'var(--muted)'}}>
          <span><i style={{display:'inline-block', width:11, height:11, background:'#1a4a8a', borderRadius:2, marginRight:6, verticalAlign:'middle'}}></i>纯碱</span>
          <span><i style={{display:'inline-block', width:11, height:11, background:'#c98a2a', borderRadius:2, marginRight:6, verticalAlign:'middle'}}></i>尿素</span>
          <span><i style={{display:'inline-block', width:11, height:11, background:'#6b5cb8', borderRadius:2, marginRight:6, verticalAlign:'middle'}}></i>小苏打</span>
          <span style={{marginLeft:'auto', color:'var(--amber)'}}>⚠ 4月为半月数据，整月预估 ≈ ×2</span>
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:14, marginTop:18}}>
        {['纯碱','尿素','小苏打'].map(cat => {
          const series = trend.map(t => t[cat]||0);
          const last = series[series.length-1];
          const prev = series[series.length-2];
          const chgPct = prev>0 ? (last-prev)/prev*100 : 0;
          const mx = Math.max(...series);
          return (
            <div key={cat} style={{padding:'12px 14px', border:'1px solid var(--line)', borderRadius:6, background:'#fafbfc'}}>
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8}}>
                <CatPill cat={cat} />
                <span style={{fontSize:11.5, color:'var(--muted)'}}>近6月趋势</span>
              </div>
              <div style={{display:'flex', alignItems:'flex-end', gap:3, height:36}}>
                {series.map((v,i)=>(
                  <div key={i} style={{flex:1, height:(v/mx*100)+'%', background: cat==='纯碱'?'#1a4a8a':cat==='尿素'?'#c98a2a':'#6b5cb8', borderRadius:'2px 2px 0 0', minHeight:3}}></div>
                ))}
              </div>
              <div style={{marginTop:8, fontSize:12}}>
                4月：<b>{(last/10000).toFixed(2)}万</b>
                <span style={{marginLeft:8, fontSize:11.5}}><Delta value={chgPct} /></span>
              </div>
            </div>
          );
        })}
      </div>

      <div className="action">
        <span className="lbl">本周做什么</span>
        <span>① 4月小苏打节奏低于近4个月均线（约2万吨），盯饲料客户复采；② 纯碱保持稳态，重点维护12家≥1,000吨大客户；③ 尿素3月反弹后4月再放缓，复盘农资季节性。</span>
      </div>
    </section>
  );
}

// ====================================================================
// Section 3 — TOP30 客户 × 6个月矩阵
// ====================================================================
function Section3CustomerMatrix() {
  const D = window.DASH_DATA;

            <tr>
              <th style={{width:36}}>#</th>
              <th>客户</th>

                    {r[m] ? Math.round(r[m]).toLocaleString() : '—'}

                ))}
                <td className="num" style={{fontSize:11.5, color: String(r.delta3v2||'').indexOf('↑')>=0 ? 'var(--green)' : String(r.delta3v2||'').indexOf('↓')>=0 ? 'var(--red)' : 'var(--muted)'}}>
                  {r.delta3v2 || '—'}

                <td className="num" style={{fontSize:11.5, color: String(r.delta4v3||'').indexOf('↑')>=0 ? 'var(--green)' : String(r.delta4v3||'').indexOf('↓')>=0 ? 'var(--red)' : 'var(--muted)'}}>
                  {r.delta4v3 || '—'}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

    let r = all.slice();
    if (search.trim()) r = r.filter(x => (x.name||'').includes(search.trim()) || (x.salesperson||'').includes(search.trim()));
    if (catFilter !== 'all') r = r.filter(x => (x.cat||'').includes(catFilter));
    if (spFilter !== 'all') r = r.filter(x => x.salesperson === spFilter);
    r.sort((a,b)=>{
      const av = a[sortKey], bv = b[sortKey];
      if (av == null && bv == null) return 0;
      if (av == null) return 1; if (bv == null) return -1;
      if (typeof av === 'number') return sortDir==='asc' ? av-bv : bv-av;
      return sortDir==='asc' ? String(av).localeCompare(bv) : String(bv).localeCompare(av);
    });
    return r;
  }, [search, catFilter, spFilter, sortKey, sortDir]);

  const totalT = rows.reduce((s,x)=>s+(x.tons||0),0);
  const totalA = rows.reduce((s,x)=>s+(x.amount||0),0);

  const handleExport = () => {
    const header = ['排名','客户','归属业务员','主品类','品类数','订单数','吨数','金额(万)'];
    const data = rows.map(r => [r.rank, r.name, r.salesperson, r.cat, r.catCount, r.orders, r.tons, r.amount]);
    downloadCSV([header, ...data], '客户业务员清单_v6.csv');
  };

  return (
    <section className="block flush" id="sec-roster">
      <div style={{padding:'24px 26px 0'}}>
        <div className="sect-head">
          <span className="num">10</span>
          <h2>完整客户 × 业务员清单</h2>
          <span className="scope">v6 归属（含 15 家人工核对修正）· 344 家全量</span>
        </div>
        <div className="takeaway">
          <b>结论：</b> 全量 344 家客户，前 50 家贡献约 70% 吨数，长尾 200+ 家维持基本面。可按客户/业务员/品类组合检索，CSV 导出后可直接对比下月数据。
        </div>
      </div>

      <div className="tbl-toolbar">
        <span className="label">筛选</span>
        <input type="search" placeholder="搜客户或业务员名" value={search} onChange={e=>setSearch(e.target.value)} />
        <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}>
          <option value="all">全部品类</option>
          <option value="纯碱">纯碱</option>
          <option value="尿素">尿素</option>
          <option value="小苏打">小苏打</option>
        </select>
        <select value={spFilter} onChange={e=>setSpFilter(e.target.value)}>
          <option value="all">全部业务员</option>
          {allSps.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <span className="label" style={{marginLeft:8}}>
          显示 <b style={{color:'var(--ink)'}}>{rows.length}</b> / {all.length} 家 ·
          合计 <b style={{color:'var(--ink)'}}>{(totalT/10000).toFixed(2)}万吨</b> /
          <b style={{color:'var(--ink)'}}> {(totalA/10000).toFixed(0)}万元</b>
        </span>
        <span className="spacer"></span>
        <button onClick={handleExport}>导出 CSV</button>
      </div>

      <div style={{maxHeight: 640, overflow:'auto'}}>
        <table className="dt">
          <thead>
            <tr>
              <ThSort k="rank" label="#" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <ThSort k="name" label="客户" sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <ThSort k="salesperson" label="归属业务员" sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <th>主品类</th>
              <ThSort k="catCount" label="品类数" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <ThSort k="orders" label="订单数" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <ThSort k="tons" label="吨数" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
              <ThSort k="amount" label="金额(万)" num sortKey={sortKey} sortDir={sortDir} onSort={onSort} />
            </tr>
          </thead>
          <tbody>
            {rows.map((r,i) => (
              <tr key={i} style={{background: r.catCount>=2?'rgba(40, 130, 70, 0.04)':undefined}}>
                <td className="num dim">{r.rank}</td>
                <td style={{fontWeight:500, maxWidth:280}} title={r.name}>{r.name}</td>
                <td>{r.salesperson||'—'}</td>
                <td><CatPill cat={r.cat} /></td>
                <td className="num">{r.catCount||1}</td>
                <td className="num dim">{r.orders ? r.orders.toLocaleString() : '—'}</td>
                <td className="num mono"><b>{Math.round(r.tons||0).toLocaleString()}</b></td>
                <td className="num mono">{(r.amount||0).toFixed(0)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{padding:'12px 26px 22px'}}>
        <div className="action">
          <span className="lbl">本周做什么</span>
          <span>① 多品类客户（绿色行）单独维护，作为跨品类销售扩展模板；② 与归属业务员核对每月新增/流失客户；③ 该清单可作为下月数据迭代的基线对照表。</span>
        </div>
      </div>
    </section>
  );
}

</script>
<script type="text/babel" data-presets="react" data-filename="mounter.jsx">
const { createRoot } = ReactDOM;

createRoot(document.getElementById('exec')).render(<window.ExecSummary />);
createRoot(document.getElementById('overview')).render(<window.CategoryOverview />);

function MidSections() {
  return (
    <>
      <Section2Trend />
      <Section3CustomerMatrix />
      <Section4Movements />
      <Section5NewLost />
      <Section6Flow />
    </>
  );
}
function TailSections() {
  return (
    <>
      <Section8Dumbbell />
      <Section9Risk />
      <Section10Roster />
    </>
  );
}

createRoot(document.getElementById('placeholder-mid')).render(<MidSections />);
createRoot(document.getElementById('sales')).render(<window.SalespersonGrandTable />);
createRoot(document.getElementById('placeholder-tail')).render(<TailSections />);

// Active nav highlight on scroll
const navLinks = document.querySelectorAll('.appbar nav a');
const ids = ['sec-summary','sec-overview','sec-trend','sec-topcust','sec-moves','sec-newlost','sec-flow','sec-sales','sec-momentum','sec-risk','sec-roster'];
window.addEventListener('scroll', () => {
  let active = ids[0];
  for (const id of ids) {
    const el = document.getElementById(id);
    if (el && el.getBoundingClientRect().top < 120) active = id;
  }
  navLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + active));
}, { passive: true });

</script>
</body>
